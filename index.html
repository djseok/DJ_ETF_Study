<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동진 투자 공부실</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #fdfbf7; }
        .mono { font-family: 'Courier New', monospace; }
    </style>
</head>
<body class="text-slate-800 p-4 md:p-8">

<div class="max-w-6xl mx-auto space-y-6">
    <div class="flex items-center gap-3 mb-8">
        <span class="text-4xl">🐕</span>
        <h1 class="text-3xl font-black text-slate-800">동진 투자 공부실</h1>
        <span class="bg-orange-100 text-orange-700 text-xs font-bold px-3 py-1 rounded-full border border-orange-200">🐾 v11.0 MASTER (차트 & 백테스트 탑재)</span>
    </div>

    <div class="flex flex-wrap gap-2 mb-6">
        <button id="btnTabQuant" onclick="switchTab('quant')" class="flex-1 py-3 bg-white text-slate-600 rounded-xl font-bold shadow-sm border border-slate-200 transition-all hover:bg-slate-50 whitespace-nowrap"><i class="fas fa-chart-line mr-2"></i>예측 엔진</button>
        <button id="btnTabPort" onclick="switchTab('port')" class="flex-1 py-3 bg-white text-slate-600 rounded-xl font-bold shadow-sm border border-slate-200 transition-all hover:bg-slate-50 whitespace-nowrap"><i class="fas fa-trophy text-yellow-500 mr-2"></i>클럽 현황</button>
        <button id="btnTabCalc" onclick="switchTab('calc')" class="flex-1 py-3 bg-white text-slate-600 rounded-xl font-bold shadow-sm border border-slate-200 transition-all hover:bg-slate-50 whitespace-nowrap"><i class="fas fa-calculator text-blue-500 mr-2"></i>구매 계산기 & 백테스트</button>
        <button id="btnTabDiv" onclick="switchTab('div')" class="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-md transition-all whitespace-nowrap"><i class="fas fa-sack-dollar text-yellow-300 mr-2"></i>배당&총알</button>
        <button id="btnTabConc" onclick="switchTab('conc')" class="flex-1 py-3 bg-white text-slate-600 rounded-xl font-bold shadow-sm border border-slate-200 transition-all hover:bg-slate-50 whitespace-nowrap"><i class="fas fa-puzzle-piece text-green-500 mr-2"></i>집중도 분석</button>
    </div>

    <div id="viewQuant" class="hidden space-y-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <label class="block text-xs font-bold text-slate-400 mb-2">분석할 자산 선택</label>
            <select id="assetSelector" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700">
                <option value="KODEX 미국반도체">KODEX 미국반도체</option>
                <option value="TIGER 미국배당다우존스">TIGER 미국배당다우존스</option>
                <option value="RISE 미국나스닥100">RISE 미국나스닥100</option>
            </select>
        </div>
        <div id="quantContainer" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 min-h-[200px] text-center text-slate-400 font-bold flex items-center justify-center">
            데이터 로딩 중... (js/quant.js 파일에 코드가 채워지면 화면이 뜹니다)
        </div>
    </div>

    <div id="viewCalc" class="hidden space-y-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h4 class="font-black text-lg text-slate-800 mb-4"><i class="fas fa-calculator text-blue-500 mr-2"></i>예수금 기반 분배 계산기</h4>
            <div class="mb-4">
                <label class="block text-xs font-bold text-slate-400 mb-1">총 투자 예수금 (₩)</label>
                <input type="number" id="inputCash" placeholder="예: 5000000" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-mono text-lg font-bold">
            </div>
            <div id="rebalancingResult"></div>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl shadow-md text-white border border-slate-700">
            <h4 class="font-black text-lg mb-4 text-emerald-400"><i class="fas fa-history mr-2"></i>타임머신 백테스팅 시뮬레이터</h4>
            <div class="flex flex-col md:flex-row gap-4 mb-4">
                <div class="w-full md:w-1/2">
                    <label class="block text-xs font-bold text-slate-400 mb-1">초기 자본금 (₩)</label>
                    <input type="number" id="btCash" value="10000000" class="w-full p-3 bg-slate-700 border border-slate-600 rounded-xl text-white font-mono">
                </div>
                <div class="w-full md:w-1/2">
                    <label class="block text-xs font-bold text-slate-400 mb-1">테스트 종목</label>
                    <select id="btAsset" class="w-full p-3 bg-slate-700 border border-slate-600 rounded-xl text-white font-bold">
                        <option value="KODEX 미국반도체">KODEX 미국반도체</option>
                        <option value="TIGER 미국배당다우존스">TIGER 미국배당다우존스</option>
                        <option value="RISE 미국나스닥100">RISE 미국나스닥100</option>
                        <option value="TIME 글로벌AI인공지능액티브">TIME 글로벌AI인공지능액티브</option>
                    </select>
                </div>
            </div>
            <button onclick="if(typeof runBacktest === 'function') runBacktest(); else alert('백테스트 모듈 로딩 중입니다.');" class="w-full py-3 bg-emerald-500 hover:bg-emerald-600 text-slate-900 rounded-xl font-black transition-all">
                시뮬레이션 가동
            </button>
            <div id="btResult" class="mt-4"></div>
        </div>
    </div>

    <div id="viewDiv" class="hidden space-y-6">
        
        <div class="bg-blue-800 text-white p-8 rounded-2xl shadow-md text-center relative overflow-hidden">
            <i class="fas fa-piggy-bank absolute -left-4 -bottom-4 text-8xl opacity-10"></i>
            <div class="text-sm font-bold text-blue-200 mb-2"><i class="fas fa-check-circle mr-1"></i>통장에 입금된 누적 실수령액 합계</div>
            <div id="actual-received-dividend" class="text-5xl font-black mono mb-3">₩0</div>
            <div id="actual-received-name-label" class="inline-block px-3 py-1 bg-blue-900/50 rounded-full text-xs text-blue-300 font-semibold border border-blue-700/50">데이터 연동 대기 중</div>
        </div>

        <div class="bg-emerald-50 border border-emerald-100 p-6 rounded-2xl shadow-sm">
            <div class="mb-6">
                <label class="block text-xs font-bold text-emerald-800 mb-1">👨‍💻 향후 배당 예측 멤버 선택</label>
                <select id="divUserSelector" class="px-4 py-2 rounded-xl border border-emerald-200 bg-white font-bold text-slate-700 min-w-[150px] shadow-sm"></select>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
                <h4 class="font-black text-lg text-slate-800 mb-4"><i class="fas fa-chart-bar text-emerald-500 mr-2"></i>월별 예상 배당금 흐름</h4>
                <div class="h-64 relative">
                    <canvas id="dividendChart"></canvas>
                </div>
            </div>

            <div class="mb-4 text-emerald-800 font-black"><i class="fas fa-money-bill-wave mr-2"></i>남은 하반기 캘린더 (월별 예상 수령액)</div>
            <div id="dividend-calendar" class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-6"></div>

            <div class="bg-white rounded-xl p-5 border border-emerald-100 shadow-sm flex justify-between items-center">
                <div class="text-sm font-bold text-emerald-700"><i class="fas fa-chart-line mr-2"></i>향후 1년 예상 총 배당금 합계</div>
                <div id="annual-dividend-pure" class="text-3xl font-black text-emerald-700 mono">₩0</div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h4 class="font-black text-lg text-slate-800 mb-4"><i class="fas fa-pen-fancy text-blue-500 mr-2"></i>실시간 매매 기록 원장 송신</h4>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-3 text-sm">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">투자자</label>
                    <select id="inputLogUser" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700">
                        <option value="동진">동진</option>
                        <option value="S">S</option>
                        <option value="J">J</option>
                        <option value="D">D</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">종목명</label>
                    <select id="inputLogStock" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700">
                        <option value="KODEX 미국반도체">KODEX 미국반도체</option>
                        <option value="TIGER 미국배당다우존스">TIGER 미국배당다우존스</option>
                        <option value="KODEX 미국나스닥100데일리커버드콜OTM">KODEX 커버드콜OTM</option>
                        <option value="RISE 미국나스닥100">RISE 미국나스닥100</option>
                        <option value="RISE 미국S&P500">RISE 미국S&P500</option>
                        <option value="TIME 글로벌AI인공지능액티브">TIME 글로벌AI</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">매수 단가 (₩)</label>
                    <input type="number" id="inputLogPrice" placeholder="65000" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-mono">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">매수 수량 (주)</label>
                    <input type="number" id="inputLogQty" placeholder="10" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-mono">
                </div>
                <div class="flex items-end">
                    <button onclick="alert('구글 서버(GAS) 연결이 필요합니다!')" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-xl shadow-md transition-all">
                        <i class="fas fa-cloud-upload-alt mr-1"></i> 원장 기록
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-blue-800 rounded-2xl shadow-sm border border-blue-700 overflow-hidden">
            <div class="p-5 border-b border-blue-700/50 flex items-center justify-between">
                <h4 class="font-black text-lg text-white"><i class="fas fa-book text-blue-300 mr-2"></i>배당금 입금 다이어리</h4>
                <span id="actual-table-title-name" class="text-xs bg-blue-900 text-blue-200 px-3 py-1 rounded-full font-bold">대기 중</span>
            </div>
            <div class="bg-white overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-blue-50 text-blue-800 text-xs uppercase font-black">
                        <tr><th class="px-6 py-4">입금 일자</th><th class="px-6 py-4">종목명 및 당시 수량</th><th class="px-6 py-4 text-right">실제 입금액 (원)</th></tr>
                    </thead>
                    <tbody id="actual-dividend-table-body" class="divide-y divide-slate-100">
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="viewConc" class="hidden">
        <div id="concContainer" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 min-h-[200px] text-center text-slate-400 font-bold flex items-center justify-center">데이터 로딩 중...</div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/main.js"></script>
<script src="js/quant.js"></script>
<script src="js/port.js"></script>
<script src="js/calc.js"></script>
<script src="js/dividend.js"></script>
<script src="js/conc.js"></script>
<script src="js/backtest.js"></script>
</body>
</html>
