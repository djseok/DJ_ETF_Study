<div id="viewDiv" class="hidden space-y-6">
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h4 class="font-black text-lg text-slate-800 mb-4">
            <i class="fas fa-chart-bar text-emerald-500 mr-2"></i>월별 예상 배당금 흐름
        </h4>
        <div class="h-64 relative">
            <canvas id="dividendChart"></canvas>
        </div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mt-6">
        <h4 class="font-black text-lg text-slate-800 mb-4">
            <i class="fas fa-pen-fancy text-blue-500 mr-2"></i>실시간 매매 기록 원장 송신
        </h4>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 text-sm">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">투자자</label>
                <select id="inputLogUser" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700">
                    <option value="동진">동진</option>
                    <option value="S">S</option>
                    <option value="J">J</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">종목명</label>
                <select id="inputLogStock" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700">
                    <option value="KODEX 미국반도체">KODEX 미국반도체</option>
                    <option value="TIGER 미국배당다우존스">TIGER 미국배당다우존스</option>
                    <option value="KODEX 미국나스닥100데일리커버드콜OTM">KODEX 미국나스닥100데일리커버드콜OTM</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">매수 단가 (₩)</label>
                <input type="number" id="inputLogPrice" placeholder="65000" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-mono">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">매수 수량 (주)</label>
                <input type="number" id="inputLogQty" placeholder="10" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-mono">
            </div>
            <div class="flex items-end">
                <button onclick="submitTransactionLog()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-xl shadow-md transition-all">
                    <i class="fas fa-cloud-upload-alt mr-1"></i> 원장 기록
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
